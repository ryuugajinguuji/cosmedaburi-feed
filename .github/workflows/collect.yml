# .github/workflows/collect.yml — 自動収集パイプライン（spec23 §2 Phase B）
#
# cron: 毎日JST朝9時（UTC 0時）実行 + 手動dispatch
# Node 20 / 依存ゼロ（npm install不要）
# note非空 → CI fail（spec23 §8）

name: collect-news

on:
  schedule:
    # JST 09:00 / 12:30 / 18:00（spec25 §1.1・1日3回）
    - cron: "0 0 * * *"
    - cron: "30 3 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "ドライラン（ファイルを変更しない）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: collect
  cancel-in-progress: false   # 直列化のみ（実行中runは完走させる）

permissions:
  contents: write
  pages: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: テスト実行（品質ゲート）
        run: node --test scripts/collect.test.mjs
        # テスト失敗 → collect を実行しない

      - name: 収集実行
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -o pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "[CI] ドライランモードで実行"
            node -e "
              import('./scripts/collect.mjs').then(m =>
                m.collect({ dryRun: true }).then(r => {
                  console.log('[CI] dryRun結果:', JSON.stringify(r));
                  process.exit(0);
                })
              ).catch(e => { console.error(e); process.exit(1); });
            " 2>&1 | tee collect.log
          else
            node scripts/collect.mjs 2>&1 | tee collect.log
          fi

      - name: 採用件数を Summary へ出力
        if: always()
        run: |
          if [ -f collect.log ]; then
            grep -E "\[collect\] (完了|source=)" collect.log >> "$GITHUB_STEP_SUMMARY" || true
          fi

      # note 非空チェックは撤廃（2026-06-14）。
      # spec23 §2 の「note 空」は自動収集アイテムの主観排除が目的で、collect.test.mjs
      # （上のテストステップ）が collect() 生成物の note='' を保証する。手動キュレーションの
      # note（NewsCard 表示用の事実ベース説明）は許容すべきで、全 news.json への一律 note
      # 空強制は手動8件を誤検出して CI を fail させていた（初回公開から schedule 連続失敗の主因）。

      - name: 変更確認
        id: check_changes
        run: |
          if git diff --quiet v1/news.json v1/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[CI] 変更なし — スキップ"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "[CI] 変更あり — コミット予定"
          fi

      - name: コミット & プッシュ
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "cosmedaburi-bot"
          git config user.email "bot@cosmedaburi-feed"
          git add v1/news.json v1/manifest.json
          VERSION=$(node -e "const m=require('./v1/manifest.json'); console.log(m.version);")
          git commit -m "chore: auto collect news v${VERSION}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 結果サマリ
        if: always()
        run: |
          echo "## 収集結果" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            import { readFileSync } from 'node:fs';
            try {
              const d = JSON.parse(readFileSync('v1/news.json', 'utf8'));
              const m = JSON.parse(readFileSync('v1/manifest.json', 'utf8'));
              console.log('| 項目 | 値 |');
              console.log('|---|---|');
              console.log('| version | ' + m.version + ' |');
              console.log('| 総アイテム数 | ' + d.items.length + ' |');
              console.log('| generated_at | ' + m.generated_at + ' |');
            } catch(e) { console.log('ファイル読み込みエラー: ' + e.message); }
          " >> "$GITHUB_STEP_SUMMARY"

      # 連続pushでPagesビルドが競合・欠落した場合の自己回復（2026-07-04: v35デプロイ欠落の再発防止）
      - name: Pagesビルドを明示要求
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X POST "repos/${{ github.repository }}/pages/builds" || true
