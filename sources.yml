#   - admission_info_keywords は appendix 設定案のセット＋「コスメ」
#     （PR TIMES 同様・マイナビ等の実例タイトル「〜コスメ35選」対応）
#   - category_rules は PR TIMES と同一（色カテゴリ判定は全ソース共通）

